services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: sima-app-${APP_ENV}
    restart: always
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    env_file:
      - .env
    networks:
      - sima

  nginx:
    image: nginx:alpine
    container_name: sima-nginx-${APP_ENV}
    restart: always
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./:/var/www/html
    depends_on:
      - app
    networks:
      - sima

networks:
  sima:
    driver: bridge
