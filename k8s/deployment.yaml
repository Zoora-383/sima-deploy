apiVersion: apps/v1
kind: Deployment
metadata:
  name: sima-app
  namespace: sima
  labels:
    app: sima-app
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: sima-app
  template:
    metadata:
      labels:
        app: sima-app
    spec:
      imagePullSecrets:
        - name: registry-credentials
      initContainers:
        - name: copy-code
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - cp -a /var/www/html/. /shared/
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          volumeMounts:
            - name: code
              mountPath: /shared

        - name: bootstrap
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
              echo "Checking database connection..."
              count=0
              until php artisan db:monitor || [ $? -eq 0 ]; do
                echo "Waiting for database..."
                sleep 2
                count=$((count+1))
                if [ $count -gt 15 ]; then echo "Database connection timeout"; exit 1; fi
              done

              mkdir -p /var/www/html/storage/framework/sessions
              mkdir -p /var/www/html/storage/framework/views
              mkdir -p /var/www/html/storage/framework/cache
              mkdir -p /var/www/html/storage/logs
              chmod -R 775 /var/www/html/storage /var/www/html/bootstrap/cache
              php artisan config:cache
              php artisan route:cache
              php artisan view:cache || true
              php artisan migrate --force --no-interaction
          envFrom:
            - secretRef:
                name: sima-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: code
              mountPath: /var/www/html
            - name: storage
              mountPath: /var/www/html/storage

      containers:
        - name: php-fpm
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - containerPort: 9000
              protocol: TCP
          envFrom:
            - secretRef:
                name: sima-secrets
          env:
            - name: APP_PORT
              value: "80"
            - name: TZ
              value: Asia/Jakarta
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1536Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
          startupProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 20
          volumeMounts:
            - name: code
              mountPath: /var/www/html
            - name: storage
              mountPath: /var/www/html/storage

        - name: nginx
          image: nginx:alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /index.php
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /index.php
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /index.php
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 20
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: code
              mountPath: /var/www/html
              readOnly: true
            - name: storage
              mountPath: /var/www/html/storage
              readOnly: true

      volumes:
        - name: code
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: sima-config
            items:
              - key: default.conf
                path: default.conf
        - name: storage
          persistentVolumeClaim:
            claimName: sima-storage
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
